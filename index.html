<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe | Player Tiers</title>
    <style>
        :root {
            --tier-1: #ffaa00;
            --tier-2: #3b82f6;
            --tier-3: #10b981;
            --tier-4: #8b5cf6;
            --tier-5: #ec4899;
            --bg-card: rgba(10, 14, 26, 0.85);
            --border-glow: rgba(255, 255, 255, 0.08);
        }

                body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #04060c;
            background-image: 
                linear-gradient(rgba(4, 6, 12, 0.93), rgba(4, 6, 12, 0.93)),
                url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS08kMnm4tSBxjWwDSGg1x-59cuIyfCoNCRyYRdRu5oRvSXe8Z9AMKPhsw&s=10'),
                url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsrKYtAJy5ZFox4LHYwDvOBhm3LmWiEShRA4tJAc102w&s');
            background-position: center, left 2% top 30%, right 2% top 60%;
            background-repeat: no-repeat, no-repeat, no-repeat;
            background-size: cover, 240px, 240px;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
        }


        .navbar {
            background: rgba(4, 6, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.9rem 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.4rem 1.2rem;
            transition: all 0.2s ease;
        }

        .nav-link.active {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        .wrapper {
            max-width: 1000px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        .hero-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8qSNiN-nLrEKu_COrEyx3a3hAg1RVU0za0rhS9B_g2gl_8qWhoYHBGHw&s=10') no-repeat center center / cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-banner h1 {
            font-size: 2.6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 20px rgba(56, 189, 248, 0.5);
        }

        .hero-banner p {
            font-size: 0.95rem;
            color: #e2e8f0;
            margin: 0.4rem 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .tier-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: 180px 1fr;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tier-label-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border-glow);
            padding: 1.5rem;
            text-align: center;
        }

        .tier-label-box h2 { font-size: 1.6rem; margin: 0; font-weight: 800; letter-spacing: 1px; }
        .tier-label-box span { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 0.4rem; color: #64748b; font-weight: 600; }

        .slots-container { display: grid; grid-template-columns: repeat(3, 1fr); }
        .slot-column { padding: 1.2rem; border-right: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; gap: 0.6rem; }
        .slot-column:last-child { border-right: none; }
        .slot-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 0.2rem; }
        .player-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 0.6rem 0.8rem; border-radius: 6px; font-size: 0.9rem; color: #cbd5e1; }

        .t1 { border: 1px solid rgba(255, 170, 0, 0.25); } .t1 h2 { color: var(--tier-1); }
        .t2 { border: 1px solid rgba(59, 130, 246, 0.25); } .t2 h2 { color: var(--tier-2); }
        .t3 { border: 1px solid rgba(16, 185, 129, 0.25); } .t3 h2 { color: var(--tier-3); }
        .t4 { border: 1px solid rgba(139, 92, 246, 0.25); } .t4 h2 { color: var(--tier-4); }
        .t5 { border: 1px solid rgba(236, 72, 153, 0.25); } .t5 h2 { color: var(--tier-5); }

        @media (max-width: 800px) {
            .tier-card { grid-template-columns: 1fr; }
            .tier-label-box { border-right: none; border-bottom: 1px solid var(--border-glow); }
            .slots-container { grid-template-columns: 1fr; }
            .slot-column { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link active">[ Tiers ]</a>
        <a href="ranks.html" class="nav-link">[ Ranks (1-20) ]</a>
    </nav>
    <div class="wrapper">
        <div class="hero-banner">
            <h1>Player Tiers</h1>
            <p>Official Skill Brackets</p>
        </div>
        <!-- TIER 1 -->
        <div class="tier-card t1">
            <div class="tier-label-box"><h2>TIER 1</h2><span>Peak Elite</span></div>
            <div class="slots-container">
                <div class="slot-column">
                    <div class="slot-title" style="color: #ffaa00;">HIGH</div>
                    <div class="player-item">PlayerOne</div>
                    <div class="player-item">PlayerTwo</div>
                </div>
                <div class="slot-column"><div class="slot-title" style="color: #cbd5e1;">MID</div><div class="player-item">PlayerA</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #64748b;">LOW</div><div class="player-item">Gamer1</div></div>
            </div>
        </div>
        <!-- TIER 2 -->
        <div class="tier-card t2">
            <div class="tier-label-box"><h2>TIER 2</h2><span>Advanced Elite</span></div>
            <div class="slots-container">
                <div class="slot-column"><div class="slot-title" style="color: #3b82f6;">HIGH</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #cbd5e1;">MID</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #64748b;">LOW</div></div>
            </div>
        </div>
        <!-- TIER 3 -->
        <div class="tier-card t3">
            <div class="tier-label-box"><h2>TIER 3</h2><span>Competent</span></div>
            <div class="slots-container">
                <div class="slot-column"><div class="slot-title" style="color: #10b981;">HIGH</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #cbd5e1;">MID</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #64748b;">LOW</div></div>
            </div>
        </div>
        <!-- TIER 4 -->
        <div class="tier-card t4">
            <div class="tier-label-box"><h2>TIER 4</h2><span>Casual</span></div>
            <div class="slots-container">
                <div class="slot-column"><div class="slot-title" style="color: #8b5cf6;">HIGH</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #cbd5e1;">MID</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #64748b;">LOW</div></div>
            </div>
        </div>
        <!-- TIER 5 -->
        <div class="tier-card t5">
            <div class="tier-label-box"><h2>TIER 5</h2><span>Beginner</span></div>
            <div class="slots-container">
                <div class="slot-column"><div class="slot-title" style="color: #ec4899;">HIGH</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #cbd5e1;">MID</div></div>
                <div class="slot-column"><div class="slot-title" style="color: #64748b;">LOW</div></div>
            </div>
        </div>
    </div>
</body>
</html>
