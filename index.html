<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe | Player Tiers</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #04060c;
            background-image: linear-gradient(rgba(4, 6, 12, 0.93), rgba(4, 6, 12, 0.93));
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            background: rgba(4, 6, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.9rem 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link { color: #64748b; text-decoration: none; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.4rem 1.2rem; transition: all 0.2s ease; }
        .nav-link.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .nav-link:hover { color: #ffffff; }

        .wrapper { max-width: 850px; margin: 2.5rem auto; padding: 0 1.5rem; }

        /* --- Intro Animation States --- */
        .hero-banner, .tier-row {
            opacity: 0;
            transform: translateY(20px);
            animation: introReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered cascading load delays for 15 rows */
        .hero-banner { animation-delay: 0.05s; }
        .tier-row:nth-child(1)  { animation-delay: 0.10s; }
        .tier-row:nth-child(2)  { animation-delay: 0.14s; }
        .tier-row:nth-child(3)  { animation-delay: 0.18s; }
        .tier-row:nth-child(4)  { animation-delay: 0.22s; }
        .tier-row:nth-child(5)  { animation-delay: 0.26s; }
        .tier-row:nth-child(6)  { animation-delay: 0.30s; }
        .tier-row:nth-child(7)  { animation-delay: 0.34s; }
        .tier-row:nth-child(8)  { animation-delay: 0.38s; }
        .tier-row:nth-child(9)  { animation-delay: 0.42s; }
        .tier-row:nth-child(10) { animation-delay: 0.46s; }
        .tier-row:nth-child(11) { animation-delay: 0.50s; }
        .tier-row:nth-child(12) { animation-delay: 0.54s; }
        .tier-row:nth-child(13) { animation-delay: 0.58s; }
        .tier-row:nth-child(14) { animation-delay: 0.62s; }
        .tier-row:nth-child(15) { animation-delay: 0.66s; }

        @keyframes introReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCho3iIcD0goAvy4S7xDOzaOlZq9717SJRwNdI3cvLXQ&s=10') no-repeat center center / cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-banner h1 { font-size: 2.6rem; margin: 0; text-transform: uppercase; letter-spacing: 4px; color: #ffffff; text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 20px rgba(56, 189, 248, 0.5); }

        .tier-container { display: flex; flex-direction: column; gap: 0.8rem; }

        .tier-row {
            display: flex;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tier-row:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tier-badge {
            width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            font-weight: 800;
            color: #04060c;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            padding: 1.1rem 0.5rem;
            text-align: center;
        }

        .tier-players {
            flex: 1;
            padding: 1.1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        .empty-placeholder {
            font-size: 0.9rem;
            color: #334155;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* Balanced smooth thematic gradients for all 15 rows */
        .t-h1 { background: linear-gradient(135deg, #ff4b72, #be123c); }
        .t-m1 { background: linear-gradient(135deg, #ff784b, #c2410c); }
        .t-l1 { background: linear-gradient(135deg, #f59e0b, #b45309); }
        
        .t-h2 { background: linear-gradient(135deg, #10b981, #047857); }
        .t-m2 { background: linear-gradient(135deg, #06b6d4, #0e7490); }
        .t-l2 { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        
        .t-h3 { background: linear-gradient(135deg, #6366f1, #4338ca); }
        .t-m3 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .t-l3 { background: linear-gradient(135deg, #d946ef, #a21caf); }
        
        .t-h4 { background: linear-gradient(135deg, #ec4899, #be185d); }
        .t-m4 { background: linear-gradient(135deg, #f43f5e, #9f1239); }
        .t-l4 { background: linear-gradient(135deg, #94a3b8, #475569); }
        
        .t-h5 { background: linear-gradient(135deg, #64748b, #334155); }
        .t-m5 { background: linear-gradient(135deg, #475569, #1e293b); }
        .t-l5 { background: linear-gradient(135deg, #334155, #0f172a); color: #94a3b8 !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link active">[ Tiers ]</a>
        <a href="ranks.html" class="nav-link">[ Ranks (1-20) ]</a>
    </nav>
    <div class="wrapper">
        <div class="hero-banner"><h1>Player Tiers</h1></div>
        <div class="tier-container">
            
            <!-- Tier 1 -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-h1">High Tier 1</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-m1">Mid Tier 1</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-l1">Low Tier 1</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>

            <!-- Tier 2 -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-h2">High Tier 2</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-m2">Mid Tier 2</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-l2">Low Tier 2</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>

            <!-- Tier 3 -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-h3">High Tier 3</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-m3">Mid Tier 3</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-l3">Low Tier 3</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>

            <!-- Tier 4 -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-h4">High Tier 4</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-m4">Mid Tier 4</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-l4">Low Tier 4</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>

            <!-- Tier 5 -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-h5">High Tier 5</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-m5">Mid Tier 5</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-l5">Low Tier 5</div>
                <div class="tier-players"><span class="empty-placeholder">TBD</span></div>
            </div>

        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSwooshSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.6);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.6);

                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.65);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        function playPopSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
                
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        function handleInteraction(e) {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        document.querySelectorAll('.tier-row').forEach(item => {
            item.addEventListener('mouseenter', () => {
                playPopSound();
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            playSwooshSound();
        });
    </script>
</body>
</html>
