<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe | Player Tiers</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #04060c;
            background-image: linear-gradient(rgba(4, 6, 12, 0.93), rgba(4, 6, 12, 0.93));
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            background: rgba(4, 6, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.9rem 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link { color: #64748b; text-decoration: none; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.4rem 1.2rem; transition: all 0.2s ease; }
        .nav-link.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .nav-link:hover { color: #ffffff; }

        .wrapper { max-width: 850px; margin: 2.5rem auto; padding: 0 1.5rem; }

        /* --- Intro Animation States --- */
        .hero-banner, .tier-row {
            opacity: 0;
            transform: translateY(30px);
            animation: introReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered cascading load delays */
        .hero-banner { animation-delay: 0.1s; }
        .tier-row:nth-child(2) { animation-delay: 0.25s; }
        .tier-row:nth-child(3) { animation-delay: 0.35s; }
        .tier-row:nth-child(4) { animation-delay: 0.45s; }
        .tier-row:nth-child(5) { animation-delay: 0.55s; }
        .tier-row:nth-child(6) { animation-delay: 0.65s; }

        @keyframes introReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCho3iIcD0goAvy4S7xDOzaOlZq9717SJRwNdI3cvLXQ&s=10') no-repeat center center / cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-banner h1 { font-size: 2.6rem; margin: 0; text-transform: uppercase; letter-spacing: 4px; color: #ffffff; text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 20px rgba(56, 189, 248, 0.5); }

        .tier-container { display: flex; flex-direction: column; gap: 1rem; }

        .tier-row {
            display: flex;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tier-row:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tier-badge {
            width: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #04060c;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .tier-players {
            flex: 1;
            padding: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        .player-tag {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.15s ease;
        }

        .tier-row:hover .player-tag {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Tier Theme Colors */
        .t-s { background: linear-gradient(135deg, #f43f5e, #be123c); }
        .t-a { background: linear-gradient(135deg, #fb923c, #c2410c); }
        .t-b { background: linear-gradient(135deg, #eab308, #a16207); }
        .t-c { background: linear-gradient(135deg, #a855f7, #6b21a8); }
        .t-d { background: linear-gradient(135deg, #64748b, #334155); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link active">[ Tiers ]</a>
        <a href="ranks.html" class="nav-link">[ Ranks (1-20) ]</a>
    </nav>
    <div class="wrapper">
        <div class="hero-banner"><h1>Player Tiers</h1></div>
        <div class="tier-container">
            <!-- S Tier -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-s">S</div>
                <div class="tier-players">
                    <span class="player-tag">Shuljo</span>
                    <span class="player-tag">foreverpawani</span>
                    <span class="player-tag">mmishi</span>
                </div>
            </div>
            <!-- A Tier -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-a">A</div>
                <div class="tier-players">
                    <span class="player-tag">mattie</span>
                    <span class="player-tag">Percy</span>
                    <span class="player-tag">Bonekoko</span>
                </div>
            </div>
            <!-- B Tier -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-b">B</div>
                <div class="tier-players">
                    <span class="player-tag">Aion</span>
                    <span class="player-tag">ryan</span>
                    <span class="player-tag">rastaclat</span>
                    <span class="player-tag">poney</span>
                </div>
            </div>
            <!-- C Tier -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-c">C</div>
                <div class="tier-players">
                    <span class="player-tag">sin</span>
                    <span class="player-tag">Bondt</span>
                    <span class="player-tag">Sinan</span>
                    <span class="player-tag">Ananas</span>
                </div>
            </div>
            <!-- D Tier -->
            <div class="tier-row" onclick="handleInteraction(event)">
                <div class="tier-badge t-d">D</div>
                <div class="tier-players">
                    <span class="player-tag">imesium</span>
                    <span class="player-tag">Fshy</span>
                    <span class="player-tag">Rimu</span>
                    <span class="player-tag">babatunde</span>
                    <span class="player-tag">Jayden</span>
                    <span class="player-tag">Kolz</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Cinematic Entry Swoosh Sound
        function playSwooshSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.6);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.6);

                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.65);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        // PC Hover Tick Sound
        function playPopSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
                
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        function handleInteraction(e) {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        // Listeners for PC hovers
        document.querySelectorAll('.tier-row').forEach(item => {
            item.addEventListener('mouseenter', () => {
                playPopSound();
            });
        });

        // Trigger swoosh on page load!
        window.addEventListener('DOMContentLoaded', () => {
            playSwooshSound();
        });
    </script>
</body>
</html>
