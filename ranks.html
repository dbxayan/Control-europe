<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe | Ranks 1-20</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #04060c;
            background-image: linear-gradient(rgba(4, 6, 12, 0.93), rgba(4, 6, 12, 0.93));
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(4, 6, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.9rem 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link { color: #64748b; text-decoration: none; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.4rem 1.2rem; transition: all 0.2s ease; }
        .nav-link.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .nav-link:hover { color: #ffffff; }

        .wrapper { max-width: 850px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .hero-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(236, 72, 153, 0.2);
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCho3iIcD0goAvy4S7xDOzaOlZq9717SJRwNdI3cvLXQ&s=10') no-repeat center center / cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-banner h1 { font-size: 2.6rem; margin: 0; text-transform: uppercase; letter-spacing: 4px; color: #ffffff; text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 20px rgba(236, 72, 153, 0.5); }

        .podium-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
        
        .podium-card { 
            background: rgba(10, 14, 26, 0.85); 
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 12px; 
            padding: 1.5rem 1rem; 
            text-align: center; 
            backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .podium-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        .p-1 { border-color: #eab308; order: 2; }
        .p-2 { border-color: #cbd5e1; order: 1; }
        .p-3 { border-color: #b45309; order: 3; }
        .p-1:hover { border-color: #fde047; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .p-2:hover { border-color: #f8fafc; box-shadow: 0 0 15px rgba(203, 213, 225, 0.2); }
        .p-3:hover { border-color: #d97706; box-shadow: 0 0 15px rgba(180, 83, 9, 0.2); }

        .rank-num { font-size: 2.2rem; font-weight: 900; margin-bottom: 0.3rem; }
        .p-1 .rank-num { color: #eab308; }
        .p-2 .rank-num { color: #cbd5e1; }
        .p-3 .rank-num { color: #b45309; }
        .podium-name { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }

        .ladder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .ladder-row { 
            background: rgba(10, 14, 26, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 8px; 
            padding: 0.8rem 1.2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.15s ease, background-color 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ladder-row:hover {
            transform: scale(1.03);
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.9);
        }
        .ladder-rank { font-weight: 800; font-size: 1rem; color: #38bdf8; }
        .ladder-name { font-size: 0.95rem; color: #cbd5e1; transition: color 0.15s ease; }
        .ladder-row:hover .ladder-name { color: #ffffff; }

        @media (max-width: 650px) {
            .podium-section { display: flex; flex-direction: column; }
            .ladder-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">[ Tiers ]</a>
        <a href="ranks.html" class="nav-link active">[ Ranks (1-20) ]</a>
    </nav>
    <div class="wrapper">

        <div class="ladder-grid">
            <div style="display: flex; flex-direction: column; gap: 0.6rem;">

                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#7</span><span class="ladder-name">Aion</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#8</span><span class="ladder-name">ryan</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#9</span><span class="ladder-name">rastaclat</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#10</span><span class="ladder-name">poney</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#11</span><span class="ladder-name">sin</span></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.6rem;">
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#12</span><span class="ladder-name">Bondt</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#13</span><span class="ladder-name">Sinan</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#14</span><span class="ladder-name">Ananas</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#15</span><span class="ladder-name">imesium</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#16</span><span class="ladder-name">Fshy</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#17</span><span class="ladder-name">Rimu</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#18</span><span class="ladder-name">babatunde</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#19</span><span class="ladder-name">Jayden</span></div>
                <div class="ladder-row" onclick="triggerHaptic()"><span class="ladder-rank">#20</span><span class="ladder-name">Kolz</span></div>
            </div>
        </div>
    </div>

    <script>
        function triggerHaptic() {
            // Check if the phone's browser supports vibration feedback
            if (navigator.vibrate) {
                // Vibrates for 15 milliseconds (a very quick, premium click feel)
                navigator.vibrate(15);
            }
        }
    </script>
</body>
</html>
