<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Europe | Ranks 1-20</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #04060c;
            background-image: linear-gradient(rgba(4, 6, 12, 0.93), rgba(4, 6, 12, 0.93));
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            background: rgba(4, 6, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.9rem 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link { color: #64748b; text-decoration: none; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.4rem 1.2rem; transition: all 0.2s ease; }
        .nav-link.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .nav-link:hover { color: #ffffff; }

        .wrapper { max-width: 850px; margin: 2.5rem auto; padding: 0 1.5rem; }

        /* --- Intro Animation States --- */
        .hero-banner, .podium-card, .ladder-row {
            opacity: 0;
            transform: translateY(30px);
            animation: introReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero-banner { animation-delay: 0.1s; }
        .p-2 { animation-delay: 0.25s; }
        .p-1 { animation-delay: 0.35s; }
        .p-3 { animation-delay: 0.45s; }
        
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(1) { animation-delay: 0.5s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(2) { animation-delay: 0.55s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(3) { animation-delay: 0.6s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(4) { animation-delay: 0.65s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(5) { animation-delay: 0.7s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(6) { animation-delay: 0.75s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(7) { animation-delay: 0.8s; }
        .ladder-grid div:nth-child(1) .ladder-row:nth-child(8) { animation-delay: 0.85s; }
        
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(1) { animation-delay: 0.55s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(2) { animation-delay: 0.6s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(3) { animation-delay: 0.65s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(4) { animation-delay: 0.7s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(5) { animation-delay: 0.75s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(6) { animation-delay: 0.8s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(7) { animation-delay: 0.85s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(8) { animation-delay: 0.9s; }
        .ladder-grid div:nth-child(2) .ladder-row:nth-child(9) { animation-delay: 0.95s; }

        @keyframes introReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(236, 72, 153, 0.2);
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCho3iIcD0goAvy4S7xDOzaOlZq9717SJRwNdI3cvLXQ&s=10') no-repeat center center / cover;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-banner h1 { font-size: 2.6rem; margin: 0; text-transform: uppercase; letter-spacing: 4px; color: #ffffff; text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 20px rgba(236, 72, 153, 0.5); }

        .podium-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2rem; align-items: end; }
        
        .podium-card { 
            position: relative;
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 12px; 
            padding: 2rem 1rem; 
            text-align: center; 
            backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .podium-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        /* --- Premium Crowns Design --- */
        .crown {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: floatCrown 3s ease-in-out infinite;
        }
        @keyframes floatCrown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Unique Themes for Podium Banners */
        .p-1 { 
            background: linear-gradient(180deg, rgba(234, 179, 8, 0.18) 0%, rgba(10, 14, 26, 0.95) 75%);
            border-color: rgba(234, 179, 8, 0.5); 
            order: 2;
            padding: 2.5rem 1rem; /* Slightly taller for #1 spot */
        }
        .p-2 { 
            background: linear-gradient(180deg, rgba(203, 213, 225, 0.14) 0%, rgba(10, 14, 26, 0.95) 75%);
            border-color: rgba(203, 213, 225, 0.4); 
            order: 1; 
        }
        .p-3 { 
            background: linear-gradient(180deg, rgba(180, 83, 9, 0.18) 0%, rgba(10, 14, 26, 0.95) 75%);
            border-color: rgba(180, 83, 9, 0.4); 
            order: 3; 
        }

        .p-1:hover { border-color: #fde047; box-shadow: 0 0 25px rgba(234, 179, 8, 0.35); }
        .p-2:hover { border-color: #f8fafc; box-shadow: 0 0 25px rgba(203, 213, 225, 0.25); }
        .p-3:hover { border-color: #d97706; box-shadow: 0 0 25px rgba(180, 83, 9, 0.3); }

        .rank-num { font-size: 2.4rem; font-weight: 900; margin-bottom: 0.1rem; line-height: 1; }
        .p-1 .rank-num { color: #eab308; text-shadow: 0 0 12px rgba(234, 179, 8, 0.5); }
        .p-2 .rank-num { color: #cbd5e1; text-shadow: 0 0 12px rgba(203, 213, 225, 0.4); }
        .p-3 .rank-num { color: #b45309; text-shadow: 0 0 12px rgba(180, 83, 9, 0.5); }
        
        /* Upgraded Visuals for Podium Names */
        .podium-name { 
            font-size: 1.25rem; 
            font-weight: 800; 
            color: #ffffff; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .p-1 .podium-name { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 2px 4px rgba(0,0,0,0.8); }
        .p-2 .podium-name { text-shadow: 0 0 10px rgba(203, 213, 225, 0.4), 0 2px 4px rgba(0,0,0,0.8); }
        .p-3 .podium-name { text-shadow: 0 0 10px rgba(180, 83, 9, 0.4), 0 2px 4px rgba(0,0,0,0.8); }

        .ladder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .ladder-row { 
            border-radius: 8px; 
            padding: 0.9rem 1.2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ladder-row:hover {
            transform: scale(1.03);
        }

        /* --- Star Formatting & Badges --- */
        .stars {
            font-size: 0.85rem;
            margin-left: 0.5rem;
            letter-spacing: -1px;
            vertical-align: middle;
        }

        /* --- Custom Unique Row Banners --- */
        
        /* Rank 4-5: Master Tier (Deep Crimson Horizon + 3 Stars) */
        .r-master {
            background: linear-gradient(90deg, rgba(225, 29, 72, 0.12) 0%, rgba(10, 14, 26, 0.85) 100%);
            border: 1px solid rgba(225, 29, 72, 0.25);
        }
        .r-master:hover {
            border-color: rgba(225, 29, 72, 0.6);
            box-shadow: 0 0 12px rgba(225, 29, 72, 0.25);
        }
        .r-master .ladder-rank { color: #f43f5e; text-shadow: 0 0 8px rgba(244, 63, 94, 0.4); }
        .r-master .stars { color: #f43f5e; filter: drop-shadow(0 0 4px rgba(244, 63, 94, 0.6)); }
        .r-master .ladder-name { text-shadow: 0 0 8px rgba(244, 63, 94, 0.2); }

        /* Rank 6-10: Diamond Tier (Electric Cyan Horizon + 2 Stars) */
        .r-diamond {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.1) 0%, rgba(10, 14, 26, 0.85) 100%);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        .r-diamond:hover {
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.25);
        }
        .r-diamond .ladder-rank { color: #22d3ee; text-shadow: 0 0 8px rgba(34, 211, 238, 0.4); }
        .r-diamond .stars { color: #22d3ee; filter: drop-shadow(0 0 4px rgba(34, 211, 238, 0.6)); }
        .r-diamond .ladder-name { text-shadow: 0 0 8px rgba(34, 211, 238, 0.15); }

        /* Rank 11-20: Platinum Tier (Amethyst Violet Horizon + 1 Star) */
        .r-platinum {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.08) 0%, rgba(10, 14, 26, 0.85) 100%);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .r-platinum:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.2);
        }
        .r-platinum .ladder-rank { color: #a78bfa; text-shadow: 0 0 8px rgba(167, 139, 250, 0.3); }
        .r-platinum .stars { color: #a78bfa; filter: drop-shadow(0 0 4px rgba(167, 139, 250, 0.5)); }


        .ladder-rank { font-weight: 800; font-size: 1rem; }
        .ladder-name { font-size: 1.05rem; color: #cbd5e1; transition: all 0.15s ease; font-weight: 700; letter-spacing: 0.5px; }
        .ladder-row:hover .ladder-name { color: #ffffff; }

        @media (max-width: 650px) {
            .podium-section { display: flex; flex-direction: column; gap: 2rem; }
            .p-1 { order: 1; width: 100%; box-sizing: border-box; }
            .p-2 { order: 2; width: 100%; box-sizing: border-box; }
            .p-3 { order: 3; width: 100%; box-sizing: border-box; }
            .ladder-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <a href="index.html" class="nav-link">[ Tiers ]</a>

    <div class="wrapper">

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSwooshSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.6);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.6);

                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.65);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        function playPopSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
                
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch(e) {
                console.log("Audio skipped");
            }
        }

        function handleInteraction(e) {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        document.querySelectorAll('.podium-card, .ladder-row').forEach(item => {
            item.addEventListener('mouseenter', () => {
                playPopSound();
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            playSwooshSound();
        });
    </script>
